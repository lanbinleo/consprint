services:
  ap-psych-final:
    build:
      context: .
      dockerfile: Dockerfile
    image: ap-psych-final:latest
    container_name: ap-psych-final
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
